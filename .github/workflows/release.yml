name: Build Release ZIP

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          zip -r postrail-mcp.zip . \
            -x '*.DS_Store' \
            -x '__MACOSX/*' \
            -x '.git/*' \
            -x '.github/*' \
            -x '*.md' \
            -x 'tests/*' \
            -x 'phpunit.*' \
            -x '.phpcs.*'

      - name: Attach ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: postrail-mcp.zip
